name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
        build_type: [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost-system-dev libboost-thread-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake boost

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j 2

      - name: Test
        if: matrix.build_type == 'Release' # Tests only in Release for speed
        working-directory: build
        run: ctest --output-on-failure -j 2

      - name: Upload artifacts (Release only)
        if: matrix.build_type == 'Release' && matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: engine-binary
          path: build/engine
          retention-days: 7
