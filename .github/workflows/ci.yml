name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
        build_type: [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev \
            libboost-system-dev \
            libboost-thread-dev

      - name: Configure OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "OPENSSL_ROOT_DIR=/usr" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake boost openssl@3 pkg-config

      - name: Configure OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLLPME_IGNORE_CONDA_PREFIX=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT_DIR}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j 2

      - name: Test
        if: matrix.build_type == 'Release' # Tests only in Release for speed
        working-directory: build
        run: ctest --output-on-failure -j 2

      - name: Upload artifacts (Release only)
        if: matrix.build_type == 'Release' && matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: engine-binary
          path: build/engine
          retention-days: 7
